$kind: http-request
name: Face Login
method: POST
url: "{{baseUrl}}/api/auth/face-login"
order: 2000
description: Authenticate student/teacher with face descriptor. Returns user object + JWT token (optional 2FA).
auth:
  type: noauth
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
        "image": "data:image/png;base64,",
        "forceLogin": true
    }
